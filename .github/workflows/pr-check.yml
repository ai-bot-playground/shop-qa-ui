name: PR check

# Lightweight PR gate for shop-qa-ui: image build + GUI smoke test.
# Make it required via branch protection -> required status check "PR check / validate".
on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: pr-check-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: shop-qa-ui:ci

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4

      - name: Build app image (Docker)
        run: docker build -f Containerfile -t "$IMAGE" .

      - name: Smoke-test the GUI boots (in container)
        run: CONTAINER_CLI=docker bash scripts/smoke_health.sh "$IMAGE"

