# Konfiguracja jawna (NIE-sekretna). Klucze API → secret.example.yaml.
# Nazwy zgodne z kodem aplikacji (src/agent.py).
apiVersion: v1
kind: ConfigMap
metadata:
  name: shop-qa-ui-config
  namespace: shop-qa-ui
data:
  # OpenRouter (OpenAI-compatible) — aktywna ścieżka LLM. Klucz API → secret
  # (OPENROUTER_API_KEY). src/agent.py: dyspozytor OpenRouter → mock.
  OPENROUTER_MODEL: "z-ai/glm-5.2"
  OPENROUTER_REASONING_EFFORT: "high"
  OPENROUTER_MAX_TOKENS: "32000"
  STREAMLIT_PORT: "8501"
