# PRZYKŁAD. Nie commituj realnych kluczy. Na produkcji użyj zewnętrznego
# menedżera sekretów (Azure Key Vault + CSI driver, sealed-secrets, ESO),
# a nie zwykłego Secret w gicie.
#
#   kubectl create secret generic shop-qa-ui-secrets \
#     --namespace shop-qa-ui \
#     --from-literal=OPENROUTER_API_KEY=sk-or-...
apiVersion: v1
kind: Secret
metadata:
  name: shop-qa-ui-secrets
  namespace: shop-qa-ui
type: Opaque
stringData:
  # Klucz OpenRouter (sk-or-...) — aktywna ścieżka LLM. src/agent.py:_openrouter_key.
  OPENROUTER_API_KEY: "REPLACE_ME"
