# PRZYKŁAD. Nie commituj realnych kluczy. Na produkcji użyj zewnętrznego
# menedżera sekretów (Azure Key Vault + CSI driver, sealed-secrets, ESO),
# a nie zwykłego Secret w gicie.
#
#   kubectl create secret generic legacy-documenter-secrets \
#     --namespace legacy-documenter \
#     --from-literal=AZURE_AI_API_KEY=...
apiVersion: v1
kind: Secret
metadata:
  name: legacy-documenter-secrets
  namespace: legacy-documenter
type: Opaque
stringData:
  # Klucz Azure AI Foundry (Bearer) — model aktywny (Opus). src/agent.py:_llm_azure.
  AZURE_AI_API_KEY: "REPLACE_ME"
  # Gdy wpięty zostanie GPT (Azure OpenAI): odkomentuj.
  # AZURE_OPENAI_API_KEY: "REPLACE_ME"
