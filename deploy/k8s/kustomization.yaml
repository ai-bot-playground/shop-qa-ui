apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: legacy-documenter

resources:
  - namespace.yaml
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml

commonLabels:
  app.kubernetes.io/part-of: legacy-documenter

