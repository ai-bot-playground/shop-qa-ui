# Szkielet Ingress. Podmień host i annotacje pod swój kontroler (nginx, Traefik,
# AGIC na Azure). Dla Streamlit potrzebny WebSocket — większość kontrolerów ma
# go domyślnie; przy nginx upewnij się co do timeoutów dla długich połączeń.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shop-qa-ui
  namespace: shop-qa-ui
  annotations:
    # nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    # nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    {}
spec:
  rules:
    - host: shop-qa-ui.example.com   # ← podmień
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: shop-qa-ui
                port:
                  number: 80
  # tls:
  #   - hosts: [shop-qa-ui.example.com]
  #     secretName: shop-qa-ui-tls
